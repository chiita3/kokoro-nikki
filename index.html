<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>こころ日記</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Maru+Gothic:wght@400;500&display=swap">
<style>
  :root {
    --paper: #F6F4ED;
    --paper-deep: #EFECE2;
    --ink: #2E2B26;
    --ink-soft: #6E6A60;
    --indigo: #3A5385;
    --indigo-soft: #8B9BBF;
    --vermil: #C2453A;
    --line: #DCD6C7;
    --green: #5E8C61;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    background-image: repeating-linear-gradient(0deg, transparent, transparent 31px, #00000006 31px, #00000006 32px);
    color: var(--ink);
    font-family: 'Zen Maru Gothic', sans-serif;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 18px 70px; }
  header { text-align: center; margin-bottom: 16px; }
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px; font-weight: 700;
    letter-spacing: .3em; margin: 4px 0 2px;
  }
  .hanko-line { width: 46px; height: 3px; background: var(--vermil); margin: 8px auto 0; border-radius: 2px; }
  #syncdot { font-size: 11px; color: var(--ink-soft); min-height: 16px; }

  nav { display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid var(--line); padding-bottom: 2px; margin-bottom: 20px; }
  nav button {
    background: none; border: none; cursor: pointer;
    font-family: inherit; font-size: 13px; color: var(--ink-soft);
    border-bottom: 2px solid transparent; padding: 6px 4px; letter-spacing: .06em;
  }
  nav button.active { color: var(--vermil); border-bottom-color: var(--vermil); }

  .datebar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .datebar .nav-arrow {
    background: none; border: 1px solid var(--line); border-radius: 8px;
    width: 36px; height: 36px; cursor: pointer; color: var(--ink-soft); font-size: 16px;
  }
  .datebar .date-label { font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 700; letter-spacing: .08em; text-align: center; }
  .today-link { background: none; border: none; color: var(--indigo); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: inherit; display: block; margin: 2px auto 0; }

  section { margin-bottom: 34px; }
  .sec-title {
    font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 700;
    color: var(--indigo); letter-spacing: .12em; margin: 0;
    display: flex; align-items: center; gap: 10px;
  }
  .sec-title .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .sec-sub { font-size: 12px; color: var(--ink-soft); margin: 4px 0 14px 18px; }

  .row { margin-bottom: 18px; }
  .stamps { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .stamp {
    width: 44px; height: 44px; border-radius: 50%;
    border: 1.5px solid var(--line); background: #fff; padding: 0;
    cursor: pointer; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s ease;
  }
  .stamp img { width: 100%; height: 100%; object-fit: cover; }
  .stamp .kanji { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 700; }
  .stamp.selected { border: 2.5px solid var(--vermil); box-shadow: 0 0 0 3px rgba(194,69,58,.13); }
  .stamp.dimmed { opacity: .5; }

  textarea.line-input {
    width: 100%; border: none; border-bottom: 1.5px solid var(--line);
    background: transparent; resize: none; outline: none;
    font-family: inherit; font-size: 15px; line-height: 1.7; color: var(--ink);
    padding: 6px 2px 8px;
  }
  .gr-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 12px; }
  .del-btn { background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 16px; margin-top: 4px; }

  .add-btn {
    margin-top: 8px; background: none; border: 1.5px dashed var(--indigo-soft);
    border-radius: 20px; color: var(--indigo); font-family: inherit;
    font-size: 13px; padding: 6px 16px; cursor: pointer;
  }
  .save-area { text-align: center; }
  .save-btn {
    background: var(--vermil); color: #fff; border: none; border-radius: 999px;
    padding: 14px 48px; font-size: 15px; font-family: 'Shippori Mincho', serif;
    font-weight: 700; letter-spacing: .2em; cursor: pointer;
  }
  .save-note { font-size: 11px; color: var(--ink-soft); margin-top: 8px; min-height: 15px; }
  .save-note.err { color: var(--vermil); }
  .save-note.ok { color: var(--green); }

  .card {
    display: block; width: 100%; text-align: left;
    background: rgba(255,255,255,.65); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
    cursor: pointer; font-family: inherit;
  }
  .card .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .card .d { font-family: 'Shippori Mincho', serif; font-weight: 700; font-size: 14px; color: var(--indigo); }
  .card .mini { display: flex; gap: 4px; align-items: center; }
  .card .mini img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
  .card .mini .kanji { font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 700; }
  .card .preview { font-size: 13px; color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .set-card {
    display: flex; align-items: center; gap: 16px;
    background: rgba(255,255,255,.65); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
  }
  .set-card .stamp { width: 54px; height: 54px; }
  .set-card .stamp .kanji { font-size: 24px; }
  .emo-name { font-family: 'Shippori Mincho', serif; font-weight: 700; font-size: 15px; margin-bottom: 6px; }
  .btn-primary {
    background: var(--indigo); color: #fff; border: none; border-radius: 8px;
    padding: 7px 15px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .btn-ghost {
    background: none; color: var(--ink-soft); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 15px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .emo-status { font-size: 12px; margin-top: 6px; min-height: 15px; }

  .field-label { font-size: 12px; color: var(--ink-soft); margin: 14px 0 4px; }
  input.text-field {
    width: 100%; border: 1px solid var(--line); border-radius: 8px;
    background: #fff; padding: 10px; font-family: inherit; font-size: 13px; color: var(--ink);
  }
  .muted { font-size: 13px; color: var(--ink-soft); line-height: 1.9; }
  .divider { border-top: 1px solid var(--line); margin: 26px 0 18px; }
  .h2-mincho { font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 700; color: var(--indigo); letter-spacing: .1em; margin: 0 0 8px; }
  .center { text-align: center; }
  .loading { text-align: center; color: var(--ink-soft); padding: 30px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>こころ日記</h1>
    <div class="hanko-line"></div>
    <div id="syncdot"></div>
  </header>
  <nav id="tabs" style="display:none">
    <button data-tab="today">きょうの記録</button>
    <button data-tab="list">これまで</button>
    <button data-tab="settings">設定</button>
  </nav>
  <div id="view"></div>
</div>

<script>
"use strict";

/* ============ 基本データ ============ */
const EMOTIONS = [
  { key: "yorokobi",  label: "喜", color: "#C9962E" },
  { key: "ikari",     label: "怒", color: "#B5473B" },
  { key: "kanashimi", label: "哀", color: "#4A6B9A" },
  { key: "tanoshimi", label: "楽", color: "#5E8C61" },
  { key: "nayami",    label: "悩", color: "#7D7290" },
  { key: "odoroki",   label: "驚", color: "#C4703C" },
];
const WEEK = ["日","月","火","水","木","金","土"];

let config = null;      // {url, secret}
let store = {};         // {キー: JSON文字列} クラウドの写し
let images = {};        // {感情キー: dataURL}
let currentDate = new Date();
let entry = emptyEntry();
let dirty = false;
let saveTimer = null;
let activeTab = "today";

try { config = JSON.parse(localStorage.getItem("kokoro-config") || "null"); } catch(e) {}
try { store  = JSON.parse(localStorage.getItem("kokoro-cache")  || "{}");   } catch(e) {}

function emptyEntry() {
  return {
    moved: [ {text:"",emotion:null}, {text:"",emotion:null}, {text:"",emotion:null} ],
    gratitude: ["","",""]
  };
}
function dateKey(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function fmtDate(d) {
  return d.getFullYear() + "年" + (d.getMonth()+1) + "月" + d.getDate() + "日（" + WEEK[d.getDay()] + "）";
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ============ クラウド通信 ============ */
async function api(payload) {
  if (!config || !config.url) throw new Error("接続設定がありません");
  const res = await fetch(config.url, {
    method: "POST",
    body: JSON.stringify(Object.assign({}, payload, { secret: config.secret }))
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "エラー");
  return json.data;
}
function cacheStore() {
  try { localStorage.setItem("kokoro-cache", JSON.stringify(store)); } catch(e) {}
}
function rebuildImages() {
  images = {};
  for (const k in store) {
    if (k.indexOf("img:") === 0 && store[k]) images[k.slice(4)] = store[k];
  }
}
async function loadAll(silent) {
  if (!silent) setSync("読み込み中…");
  try {
    const data = await api({ action: "get" });
    store = data || {};
    cacheStore();
    rebuildImages();
    setSync("");
    return true;
  } catch (e) {
    rebuildImages();
    setSync("クラウドに接続できませんでした（端末内のデータを表示中）", true);
    return false;
  }
}
async function saveKey(key, value) {
  store[key] = value;
  cacheStore();
  await api({ action: "set", key: key, value: value });
}
function setSync(msg, isError) {
  const el = document.getElementById("syncdot");
  el.textContent = msg;
  el.style.color = isError ? "var(--vermil)" : "var(--ink-soft)";
}

/* ============ 日記の保存 ============ */
function currentKey() { return "diary:" + dateKey(currentDate); }

function loadEntryFor(d) {
  const raw = store["diary:" + dateKey(d)];
  if (raw) {
    try {
      const e = JSON.parse(raw);
      const ent = emptyEntry();
      ent.moved = (e.moved && e.moved.length ? e.moved : ent.moved).map(m => ({ text: m.text||"", emotion: m.emotion||null }));
      while (ent.moved.length < 3) ent.moved.push({text:"",emotion:null});
      ent.gratitude = (e.gratitude && e.gratitude.length ? e.gratitude : ent.gratitude).slice();
      while (ent.gratitude.length < 3) ent.gratitude.push("");
      return ent;
    } catch(err) {}
  }
  return emptyEntry();
}
function scheduleSave() {
  dirty = true;
  setSaveNote("");
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 2000);
}
async function doSave() {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
  if (!dirty) return;
  const cleaned = {
    moved: entry.moved.filter((m,i) => i < 3 || (m.text && m.text.trim() !== "")),
    gratitude: entry.gratitude.filter((g,i) => i < 3 || (g && g.trim() !== "")),
    updatedAt: new Date().toISOString()
  };
  const key = currentKey();
  setSaveNote("保存中…");
  try {
    await saveKey(key, JSON.stringify(cleaned));
    dirty = false;
    setSaveNote("保存しました ✓", "ok");
  } catch (e) {
    setSaveNote("クラウドに保存できませんでした。通信環境を確認してもう一度「保存する」を押してください", "err");
  }
}
function setSaveNote(msg, cls) {
  const el = document.getElementById("savenote");
  if (!el) return;
  el.textContent = msg;
  el.className = "save-note" + (cls ? " " + cls : "");
}

/* ============ 画像処理 ============ */
function drawSquare(source, w, h, size) {
  const canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(0, 0, size, size);
  const min = Math.min(w, h);
  const sx = (w - min) / 2, sy = (h - min) / 2;
  ctx.drawImage(source, sx, sy, min, min, 0, 0, size, size);
  return canvas.toDataURL("image/jpeg", 0.85);
}
async function fileToDataUrl(file, size) {
  size = size || 128;
  if (typeof createImageBitmap === "function") {
    try {
      const bmp = await createImageBitmap(file);
      const r = drawSquare(bmp, bmp.width, bmp.height, size);
      if (bmp.close) bmp.close();
      return r;
    } catch (e) {}
  }
  const dataUrl = await new Promise((resolve, reject) => {
    const rd = new FileReader();
    rd.onload = () => resolve(rd.result);
    rd.onerror = () => reject(new Error("読み取り失敗"));
    rd.readAsDataURL(file);
  });
  const img = await new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = () => reject(new Error("この形式の画像は読み込めませんでした"));
    im.src = dataUrl;
  });
  return drawSquare(img, img.naturalWidth, img.naturalHeight, size);
}

/* ============ 画面描画 ============ */
const view = document.getElementById("view");
const tabs = document.getElementById("tabs");

function stampHtml(emoKey, cls) {
  const emo = EMOTIONS.find(e => e.key === emoKey);
  const img = images[emoKey];
  const inner = img
    ? '<img src="' + img + '" alt="' + emo.label + '">'
    : '<span class="kanji" style="color:' + emo.color + '">' + emo.label + '</span>';
  return '<button class="stamp ' + (cls||"") + '" data-emo="' + emoKey + '">' + inner + '</button>';
}

function renderTabs() {
  tabs.style.display = "flex";
  tabs.querySelectorAll("button").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === activeTab);
  });
}
tabs.addEventListener("click", async (ev) => {
  const b = ev.target.closest("button[data-tab]");
  if (!b) return;
  await doSave();
  activeTab = b.dataset.tab;
  render();
});

function render() {
  renderTabs();
  if (!config) { renderSetup(); return; }
  if (activeTab === "today") renderToday();
  else if (activeTab === "list") renderList();
  else renderSettings();
}

/* ---- 初期設定画面 ---- */
function renderSetup() {
  tabs.style.display = "none";
  view.innerHTML =
    '<p class="muted">はじめまして。最初に一度だけ、データの保存先（Googleスプレッドシート）への接続設定をします。<br>Apps Scriptで発行した <b>URL</b> と、コードに書いた<b>合言葉</b>を入力してください。</p>' +
    '<div class="field-label">ウェブアプリのURL（https://script.google.com/macros/s/…/exec）</div>' +
    '<input class="text-field" id="cfg-url" type="url" placeholder="https://script.google.com/macros/s/....../exec">' +
    '<div class="field-label">合言葉</div>' +
    '<input class="text-field" id="cfg-secret" type="text" placeholder="スクリプトに書いた合言葉">' +
    '<div class="center" style="margin-top:18px"><button class="save-btn" id="cfg-connect">接続する</button>' +
    '<div class="save-note" id="cfg-status"></div></div>';
  document.getElementById("cfg-connect").addEventListener("click", connectFromForm);
}
async function connectFromForm() {
  const url = document.getElementById("cfg-url").value.trim();
  const secret = document.getElementById("cfg-secret").value.trim();
  const st = document.getElementById("cfg-status");
  if (!url || !secret) { st.textContent = "URLと合言葉の両方を入力してください"; st.className = "save-note err"; return; }
  st.textContent = "接続を確認中…"; st.className = "save-note";
  config = { url: url, secret: secret };
  try {
    await api({ action: "get" });
    localStorage.setItem("kokoro-config", JSON.stringify(config));
    st.textContent = "接続できました ✓"; st.className = "save-note ok";
    await loadAll(true);
    activeTab = "today";
    entry = loadEntryFor(currentDate);
    setTimeout(render, 400);
  } catch (e) {
    config = JSON.parse(localStorage.getItem("kokoro-config") || "null");
    st.textContent = "接続できませんでした（" + e.message + "）。URLと合言葉を確認してください";
    st.className = "save-note err";
  }
}

/* ---- きょうの記録 ---- */
function renderToday() {
  entry = loadEntryFor(currentDate);
  dirty = false;
  const isToday = dateKey(currentDate) === dateKey(new Date());
  let html =
    '<div class="datebar">' +
      '<button class="nav-arrow" id="prev-day">‹</button>' +
      '<div><div class="date-label">' + fmtDate(currentDate) + '</div>' +
      (isToday ? '' : '<button class="today-link" id="go-today">今日にもどる</button>') +
      '</div>' +
      '<button class="nav-arrow" id="next-day">›</button>' +
    '</div>';

  html += '<section><h2 class="sec-title"><span class="dot" style="background:var(--vermil)"></span>心が動いたこと</h2>' +
          '<p class="sec-sub">感情の印を選んで、ひとこと書きとめる</p><div id="moved-rows"></div>' +
          '<button class="add-btn" id="add-moved">＋ もうひとつ書く</button></section>';

  html += '<section><h2 class="sec-title"><span class="dot" style="background:var(--indigo)"></span>感謝できること</h2>' +
          '<p class="sec-sub">小さなことでも、3つ</p><div id="gr-rows"></div>' +
          '<button class="add-btn" id="add-gr">＋ もうひとつ書く</button></section>';

  html += '<div class="save-area"><button class="save-btn" id="save-now">保存する</button>' +
          '<div class="save-note" id="savenote">入力が止まると自動でも保存されます</div></div>';

  view.innerHTML = html;

  entry.moved.forEach((m, i) => appendMovedRow(i));
  entry.gratitude.forEach((g, i) => appendGrRow(i));

  document.getElementById("prev-day").addEventListener("click", () => shiftDate(-1));
  document.getElementById("next-day").addEventListener("click", () => shiftDate(1));
  const gt = document.getElementById("go-today");
  if (gt) gt.addEventListener("click", async () => { await doSave(); currentDate = new Date(); renderToday(); });
  document.getElementById("add-moved").addEventListener("click", () => {
    entry.moved.push({text:"",emotion:null});
    appendMovedRow(entry.moved.length - 1);
    scheduleSave();
  });
  document.getElementById("add-gr").addEventListener("click", () => {
    entry.gratitude.push("");
    appendGrRow(entry.gratitude.length - 1);
    scheduleSave();
  });
  document.getElementById("save-now").addEventListener("click", () => { dirty = true; doSave(); });
}
async function shiftDate(n) {
  await doSave();
  const d = new Date(currentDate);
  d.setDate(d.getDate() + n);
  currentDate = d;
  renderToday();
}
function appendMovedRow(i) {
  const box = document.getElementById("moved-rows");
  const m = entry.moved[i];
  const row = document.createElement("div");
  row.className = "row";
  let stamps = '<div class="stamps">';
  EMOTIONS.forEach(emo => {
    let cls = "";
    if (m.emotion) cls = (m.emotion === emo.key) ? "selected" : "dimmed";
    stamps += stampHtml(emo.key, cls);
  });
  if (i >= 3) stamps += '<button class="del-btn" style="margin-left:auto" data-del="1">×</button>';
  stamps += '</div>';
  row.innerHTML = stamps + '<textarea class="line-input" rows="2" placeholder="' + (i+1) + 'つめ">' + esc(m.text) + '</textarea>';

  row.querySelectorAll(".stamp").forEach(btn => {
    btn.addEventListener("click", () => {
      const k = btn.dataset.emo;
      m.emotion = (m.emotion === k) ? null : k;
      row.querySelectorAll(".stamp").forEach(b => {
        b.className = "stamp" + (m.emotion ? (b.dataset.emo === m.emotion ? " selected" : " dimmed") : "");
      });
      scheduleSave();
    });
  });
  row.querySelector("textarea").addEventListener("input", (ev) => { m.text = ev.target.value; scheduleSave(); });
  const del = row.querySelector("[data-del]");
  if (del) del.addEventListener("click", () => {
    const idx = entry.moved.indexOf(m);
    if (idx >= 0) entry.moved.splice(idx, 1);
    row.remove();
    scheduleSave();
  });
  box.appendChild(row);
}
function appendGrRow(i) {
  const box = document.getElementById("gr-rows");
  const row = document.createElement("div");
  row.className = "gr-row";
  row.innerHTML = '<textarea class="line-input" rows="1" style="flex:1" placeholder="' + (i+1) + 'つめ">' + esc(entry.gratitude[i]) + '</textarea>' +
    (i >= 3 ? '<button class="del-btn" data-del="1">×</button>' : '');
  const ta = row.querySelector("textarea");
  let myIndex = i;
  ta.addEventListener("input", (ev) => {
    const idx = Array.prototype.indexOf.call(box.children, row);
    entry.gratitude[idx] = ev.target.value;
    scheduleSave();
  });
  const del = row.querySelector("[data-del]");
  if (del) del.addEventListener("click", () => {
    const idx = Array.prototype.indexOf.call(box.children, row);
    entry.gratitude.splice(idx, 1);
    row.remove();
    scheduleSave();
  });
  box.appendChild(row);
}

/* ---- これまで ---- */
async function renderList() {
  view.innerHTML = '<div class="loading">読み込み中…</div>';
  await loadAll(true);
  const keys = Object.keys(store).filter(k => k.indexOf("diary:") === 0).sort().reverse();
  if (keys.length === 0) {
    view.innerHTML = '<p class="loading">まだ記録がありません。<br>「きょうの記録」から書きはじめましょう。</p>';
    return;
  }
  let html = "";
  keys.forEach(k => {
    let data;
    try { data = JSON.parse(store[k]); } catch(e) { return; }
    const ds = k.replace("diary:","");
    const p = ds.split("-").map(Number);
    const d = new Date(p[0], p[1]-1, p[2]);
    const emos = [];
    (data.moved || []).forEach(m => { if (m.emotion && emos.indexOf(m.emotion) < 0) emos.push(m.emotion); });
    let mini = "";
    emos.forEach(ek => {
      const emo = EMOTIONS.find(e => e.key === ek);
      if (!emo) return;
      mini += images[ek]
        ? '<img src="' + images[ek] + '" alt="' + emo.label + '">'
        : '<span class="kanji" style="color:' + emo.color + '">' + emo.label + '</span>';
    });
    const texts = (data.moved || []).map(m => m.text).filter(t => t && t.trim()).join(" ／ ");
    html += '<button class="card" data-date="' + ds + '">' +
      '<div class="head"><span class="d">' + fmtDate(d) + '</span><span class="mini">' + mini + '</span></div>' +
      '<div class="preview">' + esc(texts || "（本文なし）") + '</div></button>';
  });
  view.innerHTML = html;
  view.querySelectorAll(".card").forEach(c => {
    c.addEventListener("click", () => {
      const p = c.dataset.date.split("-").map(Number);
      currentDate = new Date(p[0], p[1]-1, p[2]);
      activeTab = "today";
      render();
    });
  });
}

/* ---- 設定 ---- */
function renderSettings() {
  let html = '<p class="muted">喜怒哀楽それぞれに、自分のオリジナルイラストを登録できます。正方形に近い画像がきれいに表示されます。登録した画像はどの端末からも同じものが表示されます。</p>';
  EMOTIONS.forEach(emo => {
    html += '<div class="set-card" data-emo="' + emo.key + '">' +
      stampHtml(emo.key, "") +
      '<div style="flex:1"><div class="emo-name">' + emo.label + '</div>' +
      '<div style="display:flex;gap:10px">' +
      '<button class="btn-primary" data-act="pick">画像を選ぶ</button>' +
      (images[emo.key] ? '<button class="btn-ghost" data-act="reset">もとに戻す</button>' : '') +
      '</div><div class="emo-status"></div></div>' +
      '<input type="file" accept="image/*" style="display:none"></div>';
  });
  html += '<div class="divider"></div>' +
    '<h2 class="h2-mincho">接続設定</h2>' +
    '<p class="muted" style="font-size:12px">保存先スプレッドシートへの接続情報です。変更すると接続し直します。</p>' +
    '<div class="field-label">ウェブアプリのURL</div>' +
    '<input class="text-field" id="cfg-url" type="url" value="' + esc(config.url) + '">' +
    '<div class="field-label">合言葉</div>' +
    '<input class="text-field" id="cfg-secret" type="text" value="' + esc(config.secret) + '">' +
    '<div style="margin-top:12px"><button class="btn-primary" id="cfg-connect">保存して接続テスト</button></div>' +
    '<div class="save-note" id="cfg-status" style="text-align:left"></div>';
  view.innerHTML = html;

  view.querySelectorAll(".set-card").forEach(card => {
    const emoKey = card.dataset.emo;
    const fileInput = card.querySelector("input[type=file]");
    const status = card.querySelector(".emo-status");
    const pick = card.querySelector('[data-act="pick"]');
    const reset = card.querySelector('[data-act="reset"]');
    pick.addEventListener("click", () => fileInput.click());
    card.querySelector(".stamp").addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async (ev) => {
      const file = ev.target.files && ev.target.files[0];
      ev.target.value = "";
      if (!file) return;
      status.textContent = "読み込み中…"; status.style.color = "var(--ink-soft)";
      try {
        const dataUrl = await fileToDataUrl(file);
        await saveKey("img:" + emoKey, dataUrl);
        rebuildImages();
        status.textContent = "登録しました ✓"; status.style.color = "var(--green)";
        setTimeout(renderSettings, 800);
      } catch (e) {
        status.textContent = e.message || "登録できませんでした"; status.style.color = "var(--vermil)";
      }
    });
    if (reset) reset.addEventListener("click", async () => {
      status.textContent = "戻しています…"; status.style.color = "var(--ink-soft)";
      try {
        await saveKey("img:" + emoKey, "");
        rebuildImages();
        renderSettings();
      } catch (e) {
        status.textContent = "戻せませんでした"; status.style.color = "var(--vermil)";
      }
    });
  });
  document.getElementById("cfg-connect").addEventListener("click", connectFromForm);
}

/* ============ 起動 ============ */
(async function init() {
  if (!config) { render(); return; }
  renderTabs();
  view.innerHTML = '<div class="loading">読み込み中…</div>';
  await loadAll();
  entry = loadEntryFor(currentDate);
  render();
})();
</script>
</body>
